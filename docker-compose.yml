version: '3.8'

services:
  interview:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview-system
    ports:
      - "8000:8000"
    volumes:
      - ./data:/www/wwwroot/interview/data
      - ./logs:/www/wwwroot/interview/logs
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/interview.db
      - CHROMA_PERSIST_DIR=/www/wwwroot/interview/data/chroma
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
